name: Daily Financial Newsletter

on:
  schedule:
    # 8:00 AM IST = 02:30 UTC. Change to suit your timezone.
    # 8:00 AM EST  = 13:00 UTC  → cron: '0 13 * * 1-5'
    # 8:00 AM GMT  = 08:00 UTC  → cron: '0 8 * * 1-5'
    - cron: '30 2 * * 1-5'   # Mon–Fri only; use '* *' for every day
  workflow_dispatch:          # allows manual "Run workflow" from GitHub Actions tab

jobs:
  send-newsletter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r newsletter/requirements.txt

      - name: Generate and send newsletter
        env:
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python newsletter/generate_newsletter.py
