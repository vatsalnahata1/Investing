name: Daily Financial Newsletter

on:
  schedule:
    # New York time — GitHub Actions cron runs in UTC, NY observes DST:
    #   Summer (Mar–Nov, EDT = UTC-4): 8 AM EDT = 12:00 UTC  ← active below
    #   Winter (Nov–Mar, EST = UTC-5): 8 AM EST = 13:00 UTC  ← swap to '0 13 * * 1-5' in November
    - cron: '0 12 * * 1-5'   # Mon–Fri; change to '0 13 * * 1-5' when clocks fall back
  workflow_dispatch:          # allows manual "Run workflow" from GitHub Actions tab

jobs:
  send-newsletter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r newsletter/requirements.txt

      - name: Generate and send newsletter
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python newsletter/generate_newsletter.py
